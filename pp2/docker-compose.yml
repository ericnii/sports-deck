services:
  db:
    image: postgres:15
    container_name: pp2-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pp2db
    ports:
      - '8016:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: pp2-web
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Note: We use "db" as the host here instead of localhost, 
      # so the web container connects directly to the db container!
      DATABASE_URL: "postgresql://postgres:postgrespassword@db:5432/pp2db?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

  nginx:
    image: nginx:alpine
    container_name: pp2-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  postgres_data:  
